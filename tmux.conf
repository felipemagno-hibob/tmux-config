# --- Better defaults ---
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 10
set -g history-limit 100000

# --- Use vi keys in copy mode and command prompt ---
setw -g mode-keys vi
set -g status-keys vi

# --- Splits ---
unbind %
unbind '"'
bind | split-window -h
bind - split-window -v

# --- Vim-like pane navigation ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

## Optional: move between panes without prefix using Ctrl-hjkl
#bind -n C-h select-pane -L
#bind -n C-j select-pane -D
#bind -n C-k select-pane -U
#bind -n C-l select-pane -R

# --- Resize panes with Vim keys ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Windows = tabs ---
bind c new-window
# bind x kill-window
bind r command-prompt "rename-window %%"

# Vim-ish tab switching
bind -r C-h previous-window
bind -r C-l next-window

# Jump directly to tab numbers
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9

# --- Copy mode like Vim ---
bind Enter copy-mode

# In copy mode:
# v = begin selection
# y = yank selection
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# open new panes in current directory 
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# cycle panes like :wincmd w
bind w select-pane -t :.+

# --- macOS clipboard integration ---
# Requires: brew install reattach-to-user-namespace
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"
bind-key y run-shell "tmux save-buffer - | reattach-to-user-namespace pbcopy"

# --- Reload config ---
bind R source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"

# --- Status bar / tab bar ---
set -g status-position bottom
set -g status-left ""
set -g status-right ""
set -g status-interval 5

setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #[bold]#I:#W#[default] "

# --- Start names automatically from current process ---
setw -g automatic-rename on



